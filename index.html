<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>music player</title>
    <link rel="shortcut icon" href="#" />
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/music.css">
</head>
<body>
<audio id="id-audio-player" src='audio/1.mp3' data-active="0" >
</audio>
<main class="player">
    <div class="header">
        <a href="#" class="button">
            <i class="fas fa-bars" aria-hidden="true"></i>
            <span class="sr-only">menu bar</span>
        </a>
        <p>Now Playing</p>
        <a href="#" class="button">
            <i class="fas fa-search" aria-hidden="true"></i>
            <span class="sr-only">Search</span>
        </a>
    </div><!--  header  -->
    <img src="1.jpg" alt="album art" class="art"><!--  art  -->
    <div class="info">
        <h3 id="singName">1</h3>
        <p id="singer">未知</p>
    </div><!--  info  -->
    <div class="prog">
        <div class="prog-time">
            <p class="left">0:00</p>
            <p class="right">0:00</p>
        </div>
        <div class="prog-bar">
            <div class="prog-bar-inner"></div>
        </div>
    </div><!--  progress  -->
    <ul class="buttons">
        <a href="#" class="button button-sm">
            <i class="fas fa-repeat fa-sm" aria-hidden="true" id="id-i-loop"></i>
            <span class="sr-only">Shuffle</span>
        </a>
        <a href="#" class="button button-md">
            <i class="fas fa-step-backward" aria-hidden="true"></i>
            <span class="sr-only">Previous Music</span>
        </a>
        <a href="#" class="button button-md">
            <i class="fas fa-play" aria-hidden="true" id="id-play"></i>
            <span class="sr-only">Play</span>
        </a>
        <a href="#" class="button button-md">
            <i class="fas fa-step-forward"></i>
            <span class="sr-only">Next Music</span>
        </a>
        <a href="#" class="button button-sm">
            <i class="fas fa-circle-notch fa-sm" aria-hidden="true"></i>
            <span class="sr-only">Repeat Song</span>
        </a>
    </ul><!--  buttons  -->
    <div class="bar"></div><!--  bar  -->
</main>


<script src="https://kit.fontawesome.com/7d35781f0a.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
<script src="music.js">

</script>
</body>
</html>
